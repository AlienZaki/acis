name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - "app-android/**"
      - ".github/workflows/build-android.yml"
  workflow_dispatch:

jobs:
  build:
    name: assembleDebug
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('app-android/gradle/wrapper/gradle-wrapper.properties') }}

      - name: Write local.properties
        run: |
          cat > app-android/local.properties <<EOF
          sdk.dir=$ANDROID_SDK_ROOT
          acis_brain_url=${{ vars.ACIS_BRAIN_URL || 'ws://192.168.1.100:8765' }}
          EOF

      - name: assembleDebug
        run: ./gradlew :app:assembleDebug --no-daemon
        working-directory: app-android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: acis-debug-${{ github.sha }}
          path: app-android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
